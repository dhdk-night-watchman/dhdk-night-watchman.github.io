<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Night Watchman — a Rijksmuseum tour after dark</title>
  <meta name="description" content="The Night Watchman is a hybrid web game in which a museum night guard guides you by lantern through the Rijksmuseum after dark, revealing real objects from its open collection through forgiving, hint-based questions.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Spectral:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="lantern" aria-hidden="true"></div>

  <main class="wrap" id="app">
    <section id="screen-title"   class="screen"></section>
    <section id="screen-map"     class="screen"></section>
    <section id="screen-gallery" class="screen"></section>
    <section id="screen-object"  class="screen"></section>
    <section id="screen-ending"  class="screen"></section>
  </main>

  <script src="js/data.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
